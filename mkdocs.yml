  # - Resources:
  #   - Accessibility Guide: resources/ACCESSIBILITY_GUIDE.md
  #   - Industry Regulations Reference: resources/MHEALTH_REGULATIONS.md

extra_javascript:
  - assets/javascripts/mermaid-lightbox.js
  - assets/javascripts/enhanced-tooltips.js
  - assets/javascripts/decrypt-script-loader.js
  - assets/javascripts/quiz-correct-only-reveal.js

extra_css:
  - assets/stylesheets/mermaid-lightbox.css
  - assets/stylesheets/tasklist.css
  - assets/stylesheets/tooltips.css
  - assets/stylesheets/custom-admonitions.css
  - assets/stylesheets/quiz-overrides.css
  - assets/stylesheets/progress-breadcrumb.css

exclude_docs: |
  **/INSTRUCTOR_GUIDE.md
  **/CHECKPOINT_TEMPLATE.md
  **/*.py
  **/*.dart
  **/*.json
  **/*.yaml
  **/*.yml
  **/*.toml
  **/*.lock
  **/*.sh

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
