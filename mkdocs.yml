site_name: Multiplatform Mobile Software Engineering in Practice
site_description: Course materials for AGH students
site_url: https://MDaniolAGH.github.io/multiplatform/

docs_dir: docs
site_dir: _site

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips

plugins:
  - search: {}
  - mkdocs_quiz:
      disable_after_submit: false
  - d2:
      layout: dagre
      theme: 0
      dark_theme: 200
      sketch: false
      pad: 100
      scale: -1.0
      cache: true
      cache_dir: .cache
  - encryptcontent:
      global_password: 'AMM2025agh'
      title_prefix: ''
      remember_password: true
      encryption_info_message: 'Enter the course password to access materials.'

nav:
  - Home: README.md
  - AI Tools Policy: resources/ai-tools-policy.md
  - Project Grading: resources/PROJECT_GRADING.md
  - Week 0 — Getting Ready:
    - Prep Guide: resources/GETTING_READY.md
  - Week 1 — Terminal & Git:
    - Lab Workbook: week-01-terminal-git/lab/README.md
    - Cheatsheet: week-01-terminal-git/lab/CHEATSHEET.md
    - Lecture Notes: week-01-terminal-git/lecture/LECTURE_NOTES.md
  - Week 2 — Git Branching & APIs:
    - Lab Workbook: week-02-git-apis-curl/lab/README.md
    - Cheatsheet: week-02-git-apis-curl/lab/CHEATSHEET.md
    - Lecture Notes: week-02-git-apis-curl/lecture/LECTURE_NOTES.md
  - Week 3 — Dart Fundamentals:
    - Lab Workbook: week-03-dart-fundamentals/lab/README.md
    - Cheatsheet: week-03-dart-fundamentals/lab/CHEATSHEET.md
    - Lecture Notes: week-03-dart-fundamentals/lecture/LECTURE_NOTES.md
  # --- Unreleased weeks (uncomment as course progresses) ---
  # - Week 4 — Flutter Fundamentals:
  #   - Lab Workbook: week-04-flutter-fundamentals/lab/README.md
  #   - Cheatsheet: week-04-flutter-fundamentals/lab/CHEATSHEET.md
  #   - Lecture Notes: week-04-flutter-fundamentals/lecture/LECTURE_NOTES.md
  # - Week 5 — Layouts & Sprints:
  #   - Lab Workbook: week-05-layouts-forms-sprints/lab/README.md
  #   - Cheatsheet: week-05-layouts-forms-sprints/lab/CHEATSHEET.md
  #   - Lecture Notes: week-05-layouts-forms-sprints/lecture/LECTURE_NOTES.md
  # - Week 6 — State Management:
  #   - Lab Workbook: week-06-state-management/lab/README.md
  #   - Cheatsheet: week-06-state-management/lab/CHEATSHEET.md
  #   - Lecture Notes: week-06-state-management/lecture/LECTURE_NOTES.md
  # - Week 7 — Local Data:
  #   - Lab Workbook: week-07-local-data/lab/README.md
  #   - Cheatsheet: week-07-local-data/lab/CHEATSHEET.md
  #   - Lecture Notes: week-07-local-data/lecture/LECTURE_NOTES.md
  #   - Database Fundamentals: week-07-local-data/lecture/DATABASE_FUNDAMENTALS.md
  # - Week 8 — Networking & API:
  #   - Lab Workbook: week-08-networking-api/lab/README.md
  #   - Cheatsheet: week-08-networking-api/lab/CHEATSHEET.md
  #   - Lecture Notes: week-08-networking-api/lecture/LECTURE_NOTES.md
  # - Week 9 — Authentication:
