name: Deploy Course Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove unreleased week symlinks
        run: |
          # Symlinks are committed in git; remove weeks not yet in mkdocs nav
          # --- Comment out each line as you publish that week ---
          # rm -f docs/week-03-dart-fundamentals  # Published
          # rm -f docs/week-04-flutter-fundamentals  # Published
          rm -f docs/week-05-layouts-forms-sprints
          rm -f docs/week-06-state-management
          rm -f docs/week-07-local-data
          rm -f docs/week-08-networking-api
          rm -f docs/week-09-authentication
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build --site-dir _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
